<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#15192B" />
    <meta name="description" content="Find your way around SSN College of Engineering — buildings, departments and fest events, with walking directions." />
    <!-- Priority 3/5 (PWA polish) — iOS Safari has no beforeinstallprompt/
         manifest-driven install UI of its own; these are what make "Add to
         Home Screen" launch full-screen with the right icon/status bar
         instead of opening as a bookmarked browser tab. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SSN Navigator" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!--
      Phase 4A.1 — theme is normally applied by App.jsx's useTheme() effect,
      which only runs after React mounts. That left a brief window on every
      load where the page painted with light-mode CSS regardless of the
      user's actual preference, then snapped to dark a moment later. This
      script runs synchronously during head parsing, before anything is
      painted, so the correct theme is already on <html> for the very
      first frame. It intentionally mirrors useTheme()'s own logic exactly
      (stored preference > system preference) so the two never disagree.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('ssn-theme');
          var theme = (stored === 'light' || stored === 'dark')
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) { /* localStorage unavailable (privacy mode) — light default is safe */ }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>SSN Campus Navigator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
